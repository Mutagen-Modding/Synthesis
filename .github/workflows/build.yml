name: Release

on:
  push:
    branches:
      - main
      - prerelease
      - dev
  pull_request:
    branches: [ release ]

jobs:
  build:

    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - name: Setup .NET 10
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.*
    - name: Install dependencies
      run: dotnet restore Synthesis.Bethesda.sln
    - name: Build
      run: dotnet build Synthesis.Bethesda.sln -c Release --no-restore
    - name: Add local NuGet source
      run: dotnet nuget add source ${{ github.workspace }}/nupkg --name local
    - name: Test
      run: dotnet test Synthesis.Bethesda.sln -c Release --no-build
